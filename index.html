<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
<link rel="icon" href="data:," />
<title>Offroad Jeep — песочница</title>
<style>
  :root { --fg: #e8eef2; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0b0e13; }
  #app { position: fixed; inset: 0; }
  canvas { display: block; width: 100%; height: 100%; }

  /* Loading overlay */
  #loader {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 14px; background: #0b0e13; color: var(--fg);
    font: 500 16px/1.4 system-ui, -apple-system, Segoe UI, Roboto, sans-serif; z-index: 50;
    transition: opacity .5s ease; letter-spacing: .02em;
  }
  #loader .spinner {
    width: 38px; height: 38px; border: 3px solid rgba(255,255,255,.15);
    border-top-color: #6cc6ff; border-radius: 50%; animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loader.hidden { opacity: 0; pointer-events: none; }

  /* Fatal error overlay */
  #fatal {
    position: fixed; inset: 0; display: none; flex-direction: column; gap: 10px;
    padding: 28px; background: rgba(20,6,8,.96); color: #ffd9d9; z-index: 100;
    font: 13px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace; overflow: auto;
  }
  #fatal h2 { font: 600 18px system-ui, sans-serif; color: #ff7676; }
  #fatal pre { white-space: pre-wrap; word-break: break-word; }

  /* HUD */
  #hud { position: fixed; inset: 0; pointer-events: none; z-index: 30;
    font: 500 13px/1.3 system-ui, -apple-system, Segoe UI, Roboto, sans-serif; color: var(--fg); }
  #hud.hidden { display: none; }
  #hints {
    position: absolute; left: 16px; bottom: 16px; display: grid; gap: 5px;
    background: rgba(12,16,22,.5); border: 1px solid rgba(255,255,255,.08);
    border-radius: 10px; padding: 11px 13px; backdrop-filter: blur(6px);
  }
  #hints .row { white-space: nowrap; opacity: .92; }
  #hints b { display: inline-block; min-width: 96px; color: #9fd0ff; font-weight: 600; }
  #hints b.k { min-width: auto; padding: 0 2px; }
  #speedo { position: absolute; right: 18px; bottom: 14px; width: 168px; height: 168px;
    filter: drop-shadow(0 6px 18px rgba(0,0,0,.4)); }
  #speedo svg { width: 100%; height: 100%; overflow: visible; display: block; }
  #speedNum { position: absolute; left: 0; right: 0; bottom: 40px; text-align: center;
    font: 700 30px/1 ui-monospace, SFMono-Regular, Menlo, monospace; color: #fff; }
  #speedUnit { position: absolute; left: 0; right: 0; bottom: 26px; text-align: center;
    font-size: 10px; letter-spacing: .14em; color: #9fb0c0; }
  #surfaceTag { position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
    background: rgba(12,16,22,.5); border: 1px solid rgba(255,255,255,.08); border-radius: 999px;
    padding: 6px 14px; backdrop-filter: blur(6px); white-space: nowrap; }
  #surfaceTag .map { color: #9fd0ff; font-weight: 600; }
  #surfaceTag .surf { color: #f2c14e; font-weight: 600; }
  #surfaceTag .sep { opacity: .4; margin: 0 8px; }
</style>
</head>
<body>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/",
    "cannon-es": "https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"
  }
}
</script>

<script>
  // Surface any error to a visible overlay (also helps headless verification).
  window.__errors = [];
  function showFatal(msg) {
    window.__errors.push(String(msg));
    const el = document.getElementById('fatal');
    const m = document.getElementById('fatalMsg');
    if (m) m.textContent = window.__errors.join('\n\n');
    if (el) el.style.display = 'flex';
    const loader = document.getElementById('loader');
    if (loader) loader.classList.add('hidden');
  }
  window.addEventListener('error', (e) => {
    showFatal((e.error && e.error.stack) ? e.error.stack : (e.message || e));
  });
  window.addEventListener('unhandledrejection', (e) => {
    const r = e.reason;
    showFatal('Unhandled promise rejection:\n' + ((r && r.stack) ? r.stack : r));
  });
</script>

<script type="module">
import * as THREE from 'three';
import * as CANNON from 'cannon-es';

// =====================================================================================
//  Offroad Jeep — single-file sandbox driving game
//  Architecture (sections grow milestone by milestone):
//    [CONFIG] maps & vehicles · [UTIL] math/noise · [ENGINE] renderer/scene/camera/light
//    [SKY] gradient sky · [PHYSICS] world · [TERRAIN] · [VEHICLE] · [INPUT]
//    [CAMERA] follow cam · [HUD] · [FX] particles · [GAME] state machine · [LOOP]
// =====================================================================================

// Expose for headless checks / debugging.
const DBG = (window.GAME = {});

// ------------------------------------------------------------------ [UTIL]
const clamp = (v, a, b) => Math.min(b, Math.max(a, v));
const lerp = (a, b, t) => a + (b - a) * t;
const damp = (a, b, lambda, dt) => lerp(a, b, 1 - Math.exp(-lambda * dt)); // frame-rate independent
const smoothstep = (e0, e1, x) => { const t = clamp((x - e0) / (e1 - e0), 0, 1); return t * t * (3 - 2 * t); };
function mulberry32(a) { return function () { a |= 0; a = (a + 0x6D2B79F5) | 0; let t = Math.imul(a ^ (a >>> 15), 1 | a); t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t; return ((t ^ (t >>> 14)) >>> 0) / 4294967296; }; }

// ------------------------------------------------------------------ [ENGINE]
const app = document.getElementById('app');

const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
app.appendChild(renderer.domElement);

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
camera.position.set(0, 8, 16);
camera.lookAt(0, 0, 0);

// Lights — hemisphere fill + a directional sun that casts shadows.
const hemi = new THREE.HemisphereLight(0xbfd9ff, 0x4a4233, 0.8);
scene.add(hemi);

const sun = new THREE.DirectionalLight(0xfff2e0, 2.0);
sun.position.set(60, 90, 40);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 1;
sun.shadow.camera.far = 400;
const SH = 120; // shadow frustum half-size
sun.shadow.camera.left = -SH; sun.shadow.camera.right = SH;
sun.shadow.camera.top = SH; sun.shadow.camera.bottom = -SH;
sun.shadow.bias = -0.0004;
sun.shadow.normalBias = 0.03;
scene.add(sun);
scene.add(sun.target);

// ------------------------------------------------------------------ [SKY]
// Reusable gradient sky dome (per-map colors later). Renders behind everything.
function makeSky(topColor, bottomColor) {
  const geo = new THREE.SphereGeometry(1000, 32, 16);
  const mat = new THREE.ShaderMaterial({
    side: THREE.BackSide,
    depthWrite: false,
    uniforms: {
      topColor: { value: new THREE.Color(topColor) },
      bottomColor: { value: new THREE.Color(bottomColor) },
      offset: { value: 80 },
      exponent: { value: 0.7 },
    },
    vertexShader: `
      varying vec3 vWorldPosition;
      void main() {
        vec4 wp = modelMatrix * vec4(position, 1.0);
        vWorldPosition = wp.xyz;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }`,
    fragmentShader: `
      uniform vec3 topColor; uniform vec3 bottomColor;
      uniform float offset; uniform float exponent;
      varying vec3 vWorldPosition;
      void main() {
        float h = normalize(vWorldPosition + vec3(0.0, offset, 0.0)).y;
        float t = pow(clamp(h, 0.0, 1.0), exponent);
        gl_FragColor = vec4(mix(bottomColor, topColor, t), 1.0);
      }`,
  });
  return new THREE.Mesh(geo, mat);
}

// World environment configuration applied per scene (M1: a neutral "default" look).
function applyEnvironment(env) {
  if (scene.userData.sky) { scene.remove(scene.userData.sky); scene.userData.sky.geometry.dispose(); scene.userData.sky.material.dispose(); }
  const sky = makeSky(env.skyTop, env.skyBottom);
  scene.add(sky);
  scene.userData.sky = sky;
  scene.fog = new THREE.Fog(env.fog, env.fogNear, env.fogFar);
  hemi.color.set(env.hemiSky); hemi.groundColor.set(env.hemiGround); hemi.intensity = env.hemiInt;
  sun.color.set(env.sunColor); sun.intensity = env.sunInt;
  sun.position.copy(env.sunPos);
}

const DEFAULT_ENV = {
  skyTop: 0x2a5b9e, skyBottom: 0xbcd4ec, fog: 0xc4d4e4, fogNear: 60, fogFar: 700,
  hemiSky: 0xbfd9ff, hemiGround: 0x6b5a40, hemiInt: 0.85,
  sunColor: 0xfff2e0, sunInt: 2.0, sunPos: new THREE.Vector3(60, 90, 40),
};
applyEnvironment(DEFAULT_ENV);

// ------------------------------------------------------------------ [PHYSICS]
const world = new CANNON.World();
world.gravity.set(0, -9.82, 0);
world.broadphase = new CANNON.SAPBroadphase(world);
world.allowSleep = false;
// RaycastVehicle grip comes from per-wheel frictionSlip, not contact friction —
// keep default contact friction low so it doesn't fight the raycast model.
world.defaultContactMaterial.friction = 0.1;
const groundMaterial = new CANNON.Material('ground');
const FIXED_STEP = 1 / 60;

// ------------------------------------------------------------------ [NOISE] seeded value-noise FBM
function makeNoise(seed) {
  const s = (seed >>> 0) || 1;
  function hash(ix, iy) {
    let h = Math.imul(ix | 0, 374761393) ^ Math.imul(iy | 0, 668265263) ^ Math.imul(s, 1274126177);
    h = Math.imul(h ^ (h >>> 13), 1274126177);
    h ^= h >>> 16;
    return (h >>> 0) / 4294967295;
  }
  function vnoise(x, y) {
    const xi = Math.floor(x), yi = Math.floor(y), xf = x - xi, yf = y - yi;
    const u = xf * xf * (3 - 2 * xf), v = yf * yf * (3 - 2 * yf);
    const a = hash(xi, yi), b = hash(xi + 1, yi), c = hash(xi, yi + 1), d = hash(xi + 1, yi + 1);
    return lerp(lerp(a, b, u), lerp(c, d, u), v); // 0..1
  }
  function fbm(x, y, oct, lac, gain) {
    let amp = 1, fr = 1, sum = 0, norm = 0;
    for (let i = 0; i < oct; i++) { sum += amp * vnoise(x * fr, y * fr); norm += amp; amp *= gain; fr *= lac; }
    return sum / norm; // 0..1
  }
  return { vnoise, fbm };
}

// ------------------------------------------------------------------ [TERRAIN]
// Builds a CANNON.Heightfield and a matching BufferGeometry from the SAME matrix and
// SAME world-coordinate mapping, so collision and visuals can never diverge.
// Mapping (heightfield rotated -90deg about X, body at (-half,0,half)):
//   worldX = i*es - half ,  height = matrix[i][j] ,  worldZ = half - j*es
function buildTerrain(P) {
  const N = P.gridSize + 1;          // samples per side
  const es = P.elementSize;
  const half = (P.gridSize * es) / 2;
  const noise = makeNoise(P.seed);

  function heightFn(wx, wz) {
    let n = P.fbm
      ? noise.fbm(wx * P.frequency, wz * P.frequency, P.octaves, P.lacunarity, P.gain)
      : noise.vnoise(wx * P.frequency, wz * P.frequency);
    n = n * 2 - 1;                                   // -1..1
    if (P.ridged) n = 1 - Math.abs(n);               // ridged: sharp valleys/dunes
    let h = n * P.amplitude;
    if (P.secondary) h += (noise.vnoise(wx * P.secondary.freq + 50, wz * P.secondary.freq + 50) - 0.5) * 2 * P.secondary.amp;
    // Raised rim of hills to enclose the play area naturally.
    const e = Math.max(Math.abs(wx), Math.abs(wz)) / half;
    const rim = smoothstep(P.rimStart, 1.0, e) * P.rimHeight;
    // Flatten a disc around spawn so the car starts level.
    const flat = smoothstep(P.flatRadius, P.flatRadius + P.flatBlend, Math.hypot(wx, wz));
    let out = (h + rim) * flat + P.baseHeight;
    if (P.lakeLevel != null) out = Math.max(out, P.lakeLevel); // fill basins flat -> frozen lake
    return out;
  }

  const matrix = [];
  let minH = Infinity, maxH = -Infinity;
  for (let i = 0; i < N; i++) {
    matrix[i] = [];
    for (let j = 0; j < N; j++) {
      const wx = i * es - half, wz = half - j * es;
      const h = heightFn(wx, wz);
      matrix[i][j] = h;
      if (h < minH) minH = h; if (h > maxH) maxH = h;
    }
  }

  // --- Physics heightfield ---
  const hfShape = new CANNON.Heightfield(matrix, { elementSize: es });
  const hfBody = new CANNON.Body({ mass: 0, material: groundMaterial });
  hfBody.addShape(hfShape);
  hfBody.quaternion.setFromEuler(-Math.PI / 2, 0, 0);
  hfBody.position.set(-half, 0, half);
  world.addBody(hfBody);

  // --- Visual mesh (same matrix + same mapping) ---
  const verts = new Float32Array(N * N * 3);
  const cols = new Float32Array(N * N * 3);
  const cLow = new THREE.Color(P.colorLow), cHigh = new THREE.Color(P.colorHigh);
  const tmpC = new THREE.Color();
  const range = Math.max(0.001, maxH - minH);
  for (let i = 0; i < N; i++) {
    for (let j = 0; j < N; j++) {
      const k = (i * N + j) * 3;
      const h = matrix[i][j];
      verts[k] = i * es - half; verts[k + 1] = h; verts[k + 2] = half - j * es;
      const t = clamp((h - minH) / range, 0, 1);
      tmpC.copy(cLow).lerp(cHigh, Math.pow(t, 0.8));
      cols[k] = tmpC.r; cols[k + 1] = tmpC.g; cols[k + 2] = tmpC.b;
    }
  }
  const idx = [];
  for (let i = 0; i < N - 1; i++) {
    for (let j = 0; j < N - 1; j++) {
      const a = i * N + j, b = (i + 1) * N + j, c = i * N + (j + 1), d = (i + 1) * N + (j + 1);
      idx.push(a, b, c, c, b, d);
    }
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(verts, 3));
  geo.setAttribute('color', new THREE.BufferAttribute(cols, 3));
  geo.setIndex(idx);
  geo.computeVertexNormals();
  // Ensure normals face up; if the winding produced downward normals, flip indices.
  {
    const na = geo.getAttribute('normal');
    let upSum = 0; for (let v = 0; v < na.count; v += Math.max(1, (na.count / 200) | 0)) upSum += na.getY(v);
    if (upSum < 0) {
      const arr = geo.getIndex().array;
      for (let t = 0; t < arr.length; t += 3) { const m = arr[t + 1]; arr[t + 1] = arr[t + 2]; arr[t + 2] = m; }
      geo.getIndex().needsUpdate = true;
      geo.computeVertexNormals();
    }
  }
  const mat = new THREE.MeshStandardMaterial({ vertexColors: true, roughness: 1.0, metalness: 0.0, flatShading: false });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.receiveShadow = true; mesh.castShadow = true;
  scene.add(mesh);

  // --- Invisible perimeter walls (backstop beyond the rim) ---
  const wallBodies = [];
  const wallH = (maxH - minH) + 40, wallT = 4, len = half + wallT;
  const wallSpec = [
    [0, wallH / 2, half + wallT, len, wallH, wallT],
    [0, wallH / 2, -half - wallT, len, wallH, wallT],
    [half + wallT, wallH / 2, 0, wallT, wallH, len],
    [-half - wallT, wallH / 2, 0, wallT, wallH, len],
  ];
  for (const [x, y, z, sx, sy, sz] of wallSpec) {
    const wb = new CANNON.Body({ mass: 0, material: groundMaterial });
    wb.addShape(new CANNON.Box(new CANNON.Vec3(sx, sy, sz)));
    wb.position.set(x, y, z);
    world.addBody(wb);
    wallBodies.push(wb);
  }

  function heightAt(x, z) {
    let fi = clamp((x + half) / es, 0, N - 1), fj = clamp((half - z) / es, 0, N - 1);
    const i0 = Math.floor(fi), j0 = Math.floor(fj);
    const i1 = Math.min(i0 + 1, N - 1), j1 = Math.min(j0 + 1, N - 1);
    const ti = fi - i0, tj = fj - j0;
    const a = lerp(matrix[i0][j0], matrix[i1][j0], ti);
    const b = lerp(matrix[i0][j1], matrix[i1][j1], ti);
    return lerp(a, b, tj);
  }

  return { params: P, N, es, half, matrix, minH, maxH, mesh, body: hfBody, wallBodies, heightAt };
}

let terrain = null; // built per-map by loadMap()

// ------------------------------------------------------------------ [OBSTACLES]
// Solid wedge ramp (triangular prism): tapers to ground at the low (+z) tip, rises to H at
// the back (-z). Outward face winding is corrected programmatically so collision is robust.
function makeWedge(W, L, H) {
  const hw = W / 2, hl = L / 2;
  const v = [
    new CANNON.Vec3(-hw, 0, hl), new CANNON.Vec3(hw, 0, hl),   // 0,1 low tip
    new CANNON.Vec3(-hw, 0, -hl), new CANNON.Vec3(hw, 0, -hl), // 2,3 back bottom
    new CANNON.Vec3(-hw, H, -hl), new CANNON.Vec3(hw, H, -hl), // 4,5 back top
  ];
  let faces = [[0, 1, 3, 2], [2, 3, 5, 4], [0, 2, 4], [1, 5, 3], [0, 4, 5, 1]];
  const c = new CANNON.Vec3(); v.forEach((p) => c.vadd(p, c)); c.scale(1 / v.length, c);
  faces = faces.map((f) => {
    const n = v[f[1]].vsub(v[f[0]]).cross(v[f[2]].vsub(v[f[0]]));
    const fc = new CANNON.Vec3(); f.forEach((i) => fc.vadd(v[i], fc)); fc.scale(1 / f.length, fc);
    return n.dot(fc.vsub(c)) < 0 ? f.slice().reverse() : f;
  });
  const shape = new CANNON.ConvexPolyhedron({ vertices: v, faces });
  const arr = [];
  for (const f of faces) for (let k = 1; k < f.length - 1; k++)
    for (const idx of [f[0], f[k], f[k + 1]]) { const p = v[idx]; arr.push(p.x, p.y, p.z); }
  const geometry = new THREE.BufferGeometry();
  geometry.setAttribute('position', new THREE.Float32BufferAttribute(arr, 3));
  geometry.computeVertexNormals();
  return { shape, geometry };
}

// Static rocks / ramps / logs scattered on the terrain (deterministic per seed).
function buildObstacles(P) {
  const rng = mulberry32((P.seed * 2654435761) >>> 0);
  const group = new THREE.Group();
  scene.add(group);
  const rocks = [], ramps = [], logs = [];
  const rockMat = new THREE.MeshStandardMaterial({ color: P.rockColor, roughness: 1.0, metalness: 0.0, flatShading: true });
  const rampMat = new THREE.MeshStandardMaterial({ color: P.rampColor, roughness: 0.85, metalness: 0.1, flatShading: true });
  const logMat = new THREE.MeshStandardMaterial({ color: P.logColor, roughness: 0.95 });

  function slopeAt(x, z) {
    const d = 2.0;
    const hx = groundHeightAt(x + d, z) - groundHeightAt(x - d, z);
    const hz = groundHeightAt(x, z + d) - groundHeightAt(x, z - d);
    return Math.hypot(hx, hz) / (2 * d);
  }
  function spot(maxSlope) {
    for (let t = 0; t < 40; t++) {
      const x = (rng() * 2 - 1) * P.range, z = (rng() * 2 - 1) * P.range;
      if (Math.hypot(x, z) < P.clearRadius) continue;
      if (maxSlope != null && slopeAt(x, z) > maxSlope) continue;
      return [x, z];
    }
    return null;
  }

  // Rocks: sphere collider + jittered icosahedron visual, partly buried.
  for (let i = 0; i < P.rocks; i++) {
    const s = spot(null); if (!s) continue;
    const [x, z] = s, y = groundHeightAt(x, z);
    const r = lerp(0.8, 3.0, rng());
    const body = new CANNON.Body({ mass: 0, material: groundMaterial });
    body.addShape(new CANNON.Sphere(r));
    body.position.set(x, y + r * 0.3, z);
    world.addBody(body);
    const geo = new THREE.IcosahedronGeometry(r, 1);
    const pos = geo.attributes.position;
    for (let v = 0; v < pos.count; v++)
      pos.setXYZ(v, pos.getX(v) * (0.82 + rng() * 0.36), pos.getY(v) * (0.78 + rng() * 0.44), pos.getZ(v) * (0.82 + rng() * 0.36));
    geo.computeVertexNormals();
    const m = new THREE.Mesh(geo, rockMat);
    m.position.copy(body.position);
    m.rotation.set(rng() * 6.283, rng() * 6.283, rng() * 6.283);
    m.castShadow = true; m.receiveShadow = true;
    group.add(m);
    rocks.push({ body, mesh: m, r });
  }

  // Ramps: solid wedge tapering to ground at the low (+z) tip, launches the car off the back.
  for (let i = 0; i < P.ramps; i++) {
    const s = spot(0.10); if (!s) continue;
    const [x, z] = s, y = groundHeightAt(x, z);
    const W = lerp(5, 7, rng()), L = lerp(8, 11, rng());
    const tilt = lerp(0.30, 0.40, rng());   // slope angle ~17-23 deg
    const H = L * Math.tan(tilt);
    const yaw = rng() * Math.PI * 2;
    const { shape, geometry } = makeWedge(W, L, H);
    const body = new CANNON.Body({ mass: 0, material: groundMaterial });
    body.addShape(shape);
    body.quaternion.setFromEuler(0, yaw, 0);
    body.position.set(x, y, z);
    world.addBody(body);
    const m = new THREE.Mesh(geometry, rampMat);
    m.position.copy(body.position); m.quaternion.copy(body.quaternion);
    m.castShadow = true; m.receiveShadow = true;
    group.add(m);
    ramps.push({ body, mesh: m, W, L, H, tilt, yaw, x, z });
  }

  // Logs: thin box collider + cylinder visual lying on its side.
  for (let i = 0; i < P.logs; i++) {
    const s = spot(0.18); if (!s) continue;
    const [x, z] = s, y = groundHeightAt(x, z);
    const len = lerp(3.5, 6.5, rng()), rad = lerp(0.4, 0.7, rng());
    const yaw = rng() * Math.PI * 2;
    const q = new CANNON.Quaternion(); q.setFromEuler(0, yaw, 0);
    const body = new CANNON.Body({ mass: 0, material: groundMaterial });
    body.addShape(new CANNON.Box(new CANNON.Vec3(rad, rad, len / 2)));
    body.quaternion.copy(q);
    body.position.set(x, y + rad * 0.6, z);
    world.addBody(body);
    const geo = new THREE.CylinderGeometry(rad, rad, len, 12);
    geo.rotateX(Math.PI / 2); // cylinder axis Y -> Z, matching the box's long axis
    const m = new THREE.Mesh(geo, logMat);
    m.position.copy(body.position); m.quaternion.copy(body.quaternion);
    m.castShadow = true; m.receiveShadow = true;
    group.add(m);
    logs.push({ body, mesh: m, len, rad });
  }

  return { group, rocks, ramps, logs, params: P };
}

// ------------------------------------------------------------------ [VEHICLE FACTORY]
function buildChassisMesh(cfg) {
  const g = new THREE.Group();
  // Visual sits raised above the physics origin to match the COM-offset collision box.
  const inner = new THREE.Group();
  inner.position.y = cfg.comOffsetY || 0;
  g.add(inner);
  const c = cfg.chassis;
  const body = new THREE.Mesh(
    new THREE.BoxGeometry(c.hx * 2, c.hy * 2, c.hz * 2),
    new THREE.MeshStandardMaterial({ color: cfg.bodyColor, roughness: 0.6, metalness: 0.1 })
  );
  body.castShadow = true; body.receiveShadow = true;
  inner.add(body);

  const cab = new THREE.Mesh(
    new THREE.BoxGeometry(cfg.cabin.w, cfg.cabin.h, cfg.cabin.l),
    new THREE.MeshStandardMaterial({ color: cfg.cabinColor, roughness: 0.45, metalness: 0.2 })
  );
  cab.position.set(cfg.cabin.x, cfg.cabin.y, cfg.cabin.z);
  cab.castShadow = true; cab.receiveShadow = true;
  inner.add(cab);

  // Nose marker (points toward +z = forward) so orientation is unmistakable.
  const nose = new THREE.Mesh(
    new THREE.BoxGeometry(c.hx * 1.4, 0.18, 0.3),
    new THREE.MeshStandardMaterial({ color: cfg.accent, roughness: 0.5, emissive: cfg.accent, emissiveIntensity: 0.15 })
  );
  nose.position.set(0, c.hy * 0.6, c.hz - 0.1);
  nose.castShadow = true;
  inner.add(nose);
  return g;
}

function buildWheelMesh(cfg) {
  const w = cfg.wheel;
  const geo = new THREE.CylinderGeometry(w.radius, w.radius, w.width, 22);
  geo.rotateZ(Math.PI / 2); // cylinder axis Y -> X (the wheel's spin/axle axis)
  const tire = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ color: 0x15171a, roughness: 0.9 }));
  tire.castShadow = true;
  // Hub spokes so spin is visible.
  const hub = new THREE.Mesh(
    new THREE.BoxGeometry(w.width + 0.02, w.radius * 1.5, w.radius * 0.28),
    new THREE.MeshStandardMaterial({ color: 0xb8bcc2, roughness: 0.4, metalness: 0.5 })
  );
  tire.add(hub);
  return tire;
}

function createVehicle(cfg) {
  const c = cfg.chassis;
  const o = cfg.comOffsetY || 0;
  const chassisShape = new CANNON.Box(new CANNON.Vec3(c.hx, c.hy, c.hz));
  const chassisBody = new CANNON.Body({ mass: cfg.mass, material: new CANNON.Material('chassis') });
  // Box sits above the body origin so the centre of mass is low (anti-flip / anti-wheelie).
  chassisBody.addShape(chassisShape, new CANNON.Vec3(0, o, 0));
  chassisBody.angularDamping = 0.4; // tame wild spin/flips a little

  const vehicle = new CANNON.RaycastVehicle({
    chassisBody,
    indexRightAxis: 0,
    indexUpAxis: 1,
    indexForwardAxis: 2,
  });

  const w = cfg.wheel;
  const baseWheel = {
    radius: w.radius,
    directionLocal: new CANNON.Vec3(0, -1, 0),
    suspensionStiffness: w.suspensionStiffness,
    suspensionRestLength: w.suspensionRestLength,
    frictionSlip: w.frictionSlip,
    dampingRelaxation: w.dampingRelaxation,
    dampingCompression: w.dampingCompression,
    maxSuspensionForce: w.maxSuspensionForce,
    rollInfluence: w.rollInfluence,
    axleLocal: new CANNON.Vec3(-1, 0, 0),
    chassisConnectionPointLocal: new CANNON.Vec3(),
    maxSuspensionTravel: w.maxSuspensionTravel,
    customSlidingRotationalSpeed: w.customSlidingRotationalSpeed,
    useCustomSlidingRotationalSpeed: w.useCustomSlidingRotationalSpeed,
  };
  // Order: 0 FL, 1 FR, 2 RL, 3 RR. Front = +z (nose).
  // Connection Y is lifted by the COM offset so wheels keep their position relative to the box.
  const cy = cfg.connectY + o;
  const pts = [
    [-cfg.axleHalf, cy, cfg.wheelBaseFront],
    [ cfg.axleHalf, cy, cfg.wheelBaseFront],
    [-cfg.axleHalf, cy, cfg.wheelBaseRear],
    [ cfg.axleHalf, cy, cfg.wheelBaseRear],
  ];
  for (const p of pts) {
    baseWheel.chassisConnectionPointLocal.set(p[0], p[1], p[2]);
    vehicle.addWheel(baseWheel);
  }
  vehicle.addToWorld(world);

  // Meshes
  const chassisMesh = buildChassisMesh(cfg);
  scene.add(chassisMesh);
  const wheelMeshes = vehicle.wheelInfos.map(() => {
    const m = buildWheelMesh(cfg);
    scene.add(m);
    return m;
  });

  const steerWheels = [0, 1];
  const driveWheels = cfg.drive === 'fwd' ? [0, 1] : cfg.drive === 'rwd' ? [2, 3] : [0, 1, 2, 3];

  return { config: cfg, chassisBody, vehicle, chassisMesh, wheelMeshes, steerWheels, driveWheels, steer: 0 };
}

function spawnVehicle(v, x, y, z, yaw = 0) {
  const b = v.chassisBody;
  b.position.set(x, y, z);
  b.quaternion.setFromEuler(0, yaw, 0);
  b.velocity.setZero();
  b.angularVelocity.setZero();
  v.steer = 0;
}

// Sync visual meshes to physics state.
function syncVehicleMeshes(v) {
  v.chassisMesh.position.copy(v.chassisBody.position);
  v.chassisMesh.quaternion.copy(v.chassisBody.quaternion);
  for (let i = 0; i < v.wheelMeshes.length; i++) {
    v.vehicle.updateWheelTransform(i);
    const t = v.vehicle.wheelInfos[i].worldTransform;
    v.wheelMeshes[i].position.copy(t.position);
    v.wheelMeshes[i].quaternion.copy(t.quaternion);
  }
}

// ------------------------------------------------------------------ [INPUT]
const keys = Object.create(null);
const STOP_DEFAULT = new Set(['Space', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight']);
window.addEventListener('keydown', (e) => { keys[e.code] = true; if (STOP_DEFAULT.has(e.code)) e.preventDefault(); });
window.addEventListener('keyup', (e) => { keys[e.code] = false; });
window.addEventListener('blur', () => { for (const k in keys) keys[k] = false; });
const pressed = (...codes) => codes.some((c) => keys[c]);

const _fwd = new CANNON.Vec3();
function forwardSpeedOf(v) {
  v.chassisBody.quaternion.vmult(new CANNON.Vec3(0, 0, 1), _fwd); // local +z in world
  return v.chassisBody.velocity.dot(_fwd);
}

function applyVehicleControls(v, dt) {
  const cfg = v.config;
  const accel = pressed('KeyW', 'ArrowUp');
  const back = pressed('KeyS', 'ArrowDown');
  const left = pressed('KeyA', 'ArrowLeft');
  const right = pressed('KeyD', 'ArrowRight');
  const handbrake = pressed('Space');

  // Smoothed steering.
  const steerTarget = (left ? cfg.maxSteer : 0) - (right ? cfg.maxSteer : 0);
  v.steer = damp(v.steer, steerTarget, 12, dt);
  for (const i of v.steerWheels) v.vehicle.setSteeringValue(v.steer, i);

  const fwd = forwardSpeedOf(v);
  let engine = 0, brake = 0;
  // Forward drive is -engineForce with this axis/connection layout (verified by test).
  if (accel) {
    if (fwd < cfg.maxSpeed) engine = -cfg.engineForce; // cut engine past top speed
  } else if (back) {
    if (fwd > 1.0) brake = cfg.brakeForce;             // moving forward -> brake first
    else if (-fwd < cfg.maxReverse) engine = cfg.engineForce * 0.6; // then reverse, capped
  }
  // light engine braking / rolling resistance when coasting
  if (!accel && !back && !handbrake) brake = 3;

  for (let i = 0; i < 4; i++) {
    v.vehicle.applyEngineForce(v.driveWheels.includes(i) ? engine : 0, i);
    v.vehicle.setBrake(brake, i);
  }
  if (handbrake) { v.vehicle.setBrake(cfg.handbrakeForce, 2); v.vehicle.setBrake(cfg.handbrakeForce, 3); }
}

// ------------------------------------------------------------------ [GROUND HEIGHT]
function groundHeightAt(x, z) { return terrain.heightAt(x, z); }
function slopeAt(x, z) {
  const d = 2.0;
  const hx = groundHeightAt(x + d, z) - groundHeightAt(x - d, z);
  const hz = groundHeightAt(x, z + d) - groundHeightAt(x, z - d);
  return Math.hypot(hx, hz) / (2 * d); // gradient magnitude
}

// ------------------------------------------------------------------ [RESET]  (R key)
const _resetFwd = new THREE.Vector3();
const _resetQ = new THREE.Quaternion();
function resetVehicle(v) {
  const b = v.chassisBody;
  _resetQ.copy(b.quaternion);
  _resetFwd.set(0, 0, 1).applyQuaternion(_resetQ);
  const yaw = Math.atan2(_resetFwd.x, _resetFwd.z);
  const x = b.position.x, z = b.position.z;
  b.position.set(x, groundHeightAt(x, z) + 2.0, z);
  b.quaternion.setFromEuler(0, yaw, 0);
  b.velocity.setZero();
  b.angularVelocity.setZero();
  for (let i = 0; i < 4; i++) { v.vehicle.applyEngineForce(0, i); v.vehicle.setBrake(0, i); }
  v.steer = 0;
}
window.addEventListener('keydown', (e) => { if (e.code === 'KeyR' && !e.repeat) resetVehicle(player); });

// ------------------------------------------------------------------ [CAMERA] third-person follow
const camCtl = {
  az: Math.PI, pitch: 0.34, dist: 9.5, minDist: 4.5, maxDist: 24,
  target: new THREE.Vector3(), lastManual: -1e9, dragging: false,
};
const _camQ = new THREE.Quaternion();
const _camFwd = new THREE.Vector3();
const _camDir = new THREE.Vector3();
const _camDesired = new THREE.Vector3();

function shortestAngleLerp(a, b, t) {
  let d = (b - a) % (Math.PI * 2);
  if (d > Math.PI) d -= Math.PI * 2; else if (d < -Math.PI) d += Math.PI * 2;
  return a + d * t;
}

function updateCamera(v, dt, now) {
  const b = v.chassisBody;
  _camQ.copy(b.quaternion);
  _camFwd.set(0, 0, 1).applyQuaternion(_camQ);
  const carYaw = Math.atan2(_camFwd.x, _camFwd.z);
  const autoAz = carYaw + Math.PI; // sit behind the nose

  const speed = Math.hypot(b.velocity.x, b.velocity.z);
  if (!camCtl.dragging && (now - camCtl.lastManual) > 1300 && speed > 2.2) {
    const k = 1 - Math.exp(-3.0 * dt);
    camCtl.az = shortestAngleLerp(camCtl.az, autoAz, k);
    camCtl.pitch = lerp(camCtl.pitch, 0.34, k * 0.6);
  }

  const cp = Math.cos(camCtl.pitch), sp = Math.sin(camCtl.pitch);
  _camDir.set(Math.sin(camCtl.az) * cp, sp, Math.cos(camCtl.az) * cp);
  camCtl.target.set(b.position.x, b.position.y + 1.05, b.position.z);
  _camDesired.copy(camCtl.target).addScaledVector(_camDir, camCtl.dist);

  camera.position.x = damp(camera.position.x, _camDesired.x, 9, dt);
  camera.position.y = damp(camera.position.y, _camDesired.y, 9, dt);
  camera.position.z = damp(camera.position.z, _camDesired.z, 9, dt);
  camera.position.y = Math.max(camera.position.y, groundHeightAt(camera.position.x, camera.position.z) + 0.6);
  camera.lookAt(camCtl.target);
}

(function bindCameraInput() {
  const el = renderer.domElement;
  el.addEventListener('mousedown', (e) => { if (e.button === 0) { camCtl.dragging = true; camCtl.lastManual = performance.now(); } });
  window.addEventListener('mouseup', () => { if (camCtl.dragging) { camCtl.dragging = false; camCtl.lastManual = performance.now(); } });
  window.addEventListener('mousemove', (e) => {
    if (!camCtl.dragging) return;
    camCtl.az -= e.movementX * 0.005;
    camCtl.pitch = clamp(camCtl.pitch - e.movementY * 0.005, 0.06, 1.35);
    camCtl.lastManual = performance.now();
  });
  el.addEventListener('wheel', (e) => {
    e.preventDefault();
    camCtl.dist = clamp(camCtl.dist + e.deltaY * 0.012, camCtl.minDist, camCtl.maxDist);
  }, { passive: false });
  el.addEventListener('contextmenu', (e) => e.preventDefault());
})();

// ------------------------------------------------------------------ [SURFACE FX] per-frame grip + viscosity
function applySurface(v, dt) {
  if (!currentSurfaceAt) return;
  const b = v.chassisBody;
  const x = b.position.x, z = b.position.z;
  const grounded = (b.position.y - groundHeightAt(x, z)) < 1.2;
  const surf = currentSurfaceAt(x, z);
  let slip = surf.frictionSlip;
  if (surf.slopeGripLoss) // sand: lose grip on steep dunes
    slip = Math.max(surf.minSlip || 0.5, slip * (1 - clamp(slopeAt(x, z) * surf.slopeGripLoss, 0, 0.65)));
  for (let i = 0; i < 4; i++) v.vehicle.wheelInfos[i].frictionSlip = slip;
  if (grounded && surf.drag > 0) { // rolling resistance / viscosity
    b.force.x += -surf.drag * b.mass * b.velocity.x;
    b.force.z += -surf.drag * b.mass * b.velocity.z;
  }
  v.surface = surf;
  v.grounded = grounded;
}

// ------------------------------------------------------------------ [MAP LOADER]
function disposeWorldContent() {
  if (terrain) {
    scene.remove(terrain.mesh);
    terrain.mesh.geometry.dispose(); terrain.mesh.material.dispose();
    world.removeBody(terrain.body);
    for (const wb of terrain.wallBodies) world.removeBody(wb);
  }
  if (obstacles) {
    scene.remove(obstacles.group);
    const mats = new Set();
    obstacles.group.traverse((o) => { if (o.geometry) o.geometry.dispose(); if (o.material) mats.add(o.material); });
    mats.forEach((m) => m.dispose());
    for (const arr of [obstacles.rocks, obstacles.ramps, obstacles.logs])
      for (const o of arr) world.removeBody(o.body);
  }
}

function loadMap(map) {
  disposeWorldContent();
  currentMap = map;
  applyEnvironment(map.env);
  terrain = buildTerrain(map.terrain);
  obstacles = buildObstacles({ ...map.obstacles, range: terrain.half * 0.8, clearRadius: 16 });
  currentSurfaceAt = map.surfaceAt;
  if (player) {
    spawnVehicle(player, 0, terrain.heightAt(0, 0) + 2.2, 0, 0);
    camCtl.az = Math.PI; camCtl.pitch = 0.34; camCtl.dist = 9.5; camCtl.lastManual = -1e9;
    // snap the camera behind immediately so we don't see it fly across the map
    camera.position.set(0, terrain.heightAt(0, 0) + 6, -10);
  }
  DBG.terrain = terrain; DBG.obstacles = obstacles;
  DBG.currentMap = currentMap; DBG.currentSurfaceAt = currentSurfaceAt;
}

// ------------------------------------------------------------------ [LOOP]
let lastTime = performance.now();
let frame = 0;
function animate(now) {
  requestAnimationFrame(animate);
  if (now === undefined) now = performance.now();
  const dt = Math.min((now - lastTime) / 1000, 1 / 20); // clamp to avoid huge steps after tab-out
  lastTime = now;
  frame++;

  applyVehicleControls(player, dt);
  applySurface(player, dt);
  world.step(FIXED_STEP, dt, 3);
  syncVehicleMeshes(player);
  updateCamera(player, dt, now);
  updateHUD(player);

  renderer.render(scene, camera);
}

loadMap(MAPS.desert); // initial map
animate();

// Hide loader once first frame is scheduled.
requestAnimationFrame(() => {
  const loader = document.getElementById('loader');
  if (loader && window.__errors.length === 0) loader.classList.add('hidden');
});

// Expose handles for debugging / verification.
Object.assign(DBG, {
  THREE, CANNON, scene, camera, renderer, applyEnvironment,
  world, player, keys, spawnVehicle, forwardSpeedOf,
  camCtl, resetVehicle, groundHeightAt, slopeAt, buildTerrain, makeNoise,
  loadMap, MAPS, SURF, terrain, obstacles, currentMap,
  setSurface: (s) => { currentSurfaceAt = () => s; }, // test hook
});
Object.defineProperty(DBG, 'frame', { get: () => frame });
console.log('[M6] maps + surfaces ready · three', THREE.REVISION);
</script>
